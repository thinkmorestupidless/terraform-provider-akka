version: "2"

linters:
  default: none
  enable:
    - errcheck        # unchecked errors
    - govet           # official go vet
    - staticcheck     # broad static analysis
    - ineffassign     # assignments whose result is never used
    - unused          # unused code
    - misspell        # common spelling mistakes in comments/strings
    - noctx           # http calls without context
    - contextcheck    # incorrect context propagation

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/thinkmorestupidless/terraform-provider-akka

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - contextcheck
  max-issues-per-linter: 0
  max-same-issues: 0
